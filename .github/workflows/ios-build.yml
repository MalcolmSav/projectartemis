name: iOS build (local, free)

# Builds the iOS .ipa on GitHub's macOS runner using `eas build --local`, which
# does NOT consume EAS cloud build credits. Trigger it by hand from the Actions
# tab. Optionally submits to TestFlight afterwards.
#
# Required repo secret: EXPO_TOKEN  (Expo → Account → Access Tokens → create).
# Signing credentials + the App Store Connect submit key are fetched from EAS
# via that token, so nothing else needs to be stored here.

on:
  workflow_dispatch:
    inputs:
      submit:
        description: 'Submit to TestFlight after building'
        type: boolean
        default: true

jobs:
  build:
    # macos-15 ships Xcode 16.x — Expo SDK 54 / RN 0.81 needs Xcode >= 16.1.
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build IPA locally (no EAS build credits)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --local --platform ios --profile production --non-interactive --output "$GITHUB_WORKSPACE/artemis.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: artemis-ios-ipa
          path: ${{ github.workspace }}/artemis.ipa
          if-no-files-found: error

      - name: Submit to TestFlight
        if: ${{ inputs.submit }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas submit --platform ios --path "$GITHUB_WORKSPACE/artemis.ipa" --profile production --non-interactive
